name: Build Debug APK with Gradle 9.3

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Create Gradle Wrapper with Version 8.5 (for AGP 9.3)
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Creating gradle wrapper..."
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew
    
    - name: Auto-generate settings.gradle.kts
      run: |
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "ParallelSpace"
        include(":app")
        EOF
    
    - name: Auto-generate Project Level build.gradle.kts
      run: |
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "9.3.0-alpha01" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        
        task<Delete>("clean") {
            delete(rootProject.buildDir)
        }
        EOF
    
    - name: Auto-generate App Level build.gradle.kts
      run: |
        mkdir -p app
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.konasl.nagad.parallel"
            compileSdk = 34
        
            defaultConfig {
                applicationId = "com.konasl.nagad.parallel"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
        
                ndk {
                    abiFilters.add("arm64-v8a")
                }
            }
        
            buildTypes {
                debug {
                    isMinifyEnabled = false
                    isDebuggable = true
                }
                release {
                    isMinifyEnabled = false
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }
        
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
        
            kotlinOptions {
                jvmTarget = "17"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.recyclerview:recyclerview:1.3.2")
            implementation("androidx.cardview:cardview:1.0.0")
        }
        EOF
    
    - name: Auto-generate AndroidManifest.xml
      run: |
        mkdir -p app/src/main
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
        
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
        
            <queries>
                <intent>
                    <action android:name="android.intent.action.MAIN" />
                    <category android:name="android.intent.category.LAUNCHER" />
                </intent>
                <package android:name="com.konasl.nagad" />
            </queries>
        
            <application
                android:allowBackup="true"
                android:icon="@android:drawable/sym_def_app_icon"
                android:label="Parallel Space"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.Material.NoActionBar">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
    
    - name: Auto-generate MainActivity.kt
      run: |
        mkdir -p app/src/main/java/com/konasl/nagad/parallel
        cat > app/src/main/java/com/konasl/nagad/parallel/MainActivity.kt << 'EOF'
        package com.konasl.nagad.parallel
        
        import android.content.pm.PackageManager
        import android.content.pm.ResolveInfo
        import android.graphics.Color
        import android.graphics.drawable.Drawable
        import android.os.Bundle
        import android.widget.*
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import androidx.recyclerview.widget.LinearLayoutManager
        import androidx.recyclerview.widget.RecyclerView
        
        class MainActivity : AppCompatActivity() {
        
            private lateinit var recyclerView: RecyclerView
            private lateinit var appList: MutableList<AppInfo>
            private lateinit var clonedApps: MutableSet<String>
        
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                clonedApps = getSharedPreferences("cloned", MODE_PRIVATE)
                    .getStringSet("cloned_list", emptySet())?.toMutableSet() ?: mutableSetOf()
                
                setupUI()
                loadInstalledApps()
            }
        
            private fun setupUI() {
                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(40, 40, 40, 40)
                    setBackgroundColor(Color.parseColor("#1a1a1a"))
                }
        
                val titleText = TextView(this).apply {
                    text = "Parallel Space"
                    textSize = 28f
                    setTextColor(Color.WHITE)
                    gravity = android.view.Gravity.CENTER
                    setPadding(0, 0, 0, 40)
                }
                mainLayout.addView(titleText)
        
                recyclerView = RecyclerView(this).apply {
                    layoutManager = LinearLayoutManager(this@MainActivity)
                }
                mainLayout.addView(recyclerView)
        
                setContentView(mainLayout)
            }
        
            private fun loadInstalledApps() {
                val intent = android.content.Intent(android.content.Intent.ACTION_MAIN)
                    .addCategory(android.content.Intent.CATEGORY_LAUNCHER)
                
                val resolveInfoList: List<ResolveInfo> = packageManager.queryIntentActivities(intent, 0)
                
                appList = mutableListOf()
                for (resolveInfo in resolveInfoList) {
                    val packageName = resolveInfo.activityInfo.packageName
                    val appName = resolveInfo.loadLabel(packageManager).toString()
                    val icon = resolveInfo.loadIcon(packageManager)
                    
                    if (packageName == this.packageName) continue
                    
                    appList.add(
                        AppInfo(
                            packageName = packageName,
                            appName = appName,
                            icon = icon,
                            isCloned = clonedApps.contains(packageName)
                        )
                    )
                }
                
                appList.sortBy { it.appName }
                
                recyclerView.adapter = AppAdapter(appList) { appInfo ->
                    if (appInfo.isCloned) {
                        launchApp(appInfo.packageName)
                    } else {
                        showCloneDialog(appInfo)
                    }
                }
            }
        
            private fun showCloneDialog(appInfo: AppInfo) {
                AlertDialog.Builder(this)
                    .setTitle("Clone App")
                    .setMessage("Clone \"${appInfo.appName}\"?")
                    .setPositiveButton("Clone") { _, _ ->
                        clonedApps.add(appInfo.packageName)
                        getSharedPreferences("cloned", MODE_PRIVATE).edit().putStringSet("cloned_list", clonedApps).apply()
                        appInfo.isCloned = true
                        recyclerView.adapter?.notifyDataSetChanged()
                        Toast.makeText(this, "${appInfo.appName} cloned!", Toast.LENGTH_SHORT).show()
                    }
                    .setNegativeButton("Cancel", null)
                    .show()
            }
        
            private fun launchApp(packageName: String) {
                try {
                    val launchIntent = packageManager.getLaunchIntentForPackage(packageName)
                    if (launchIntent != null) {
                        launchIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        startActivity(launchIntent)
                    } else {
                        Toast.makeText(this, "Cannot launch", Toast.LENGTH_SHORT).show()
                    }
                } catch (e: Exception) {
                    Toast.makeText(this, "Error: ${e.message}", Toast.LENGTH_SHORT).show()
                }
            }
        
            inner class AppAdapter(
                private val apps: List<AppInfo>,
                private val onItemClick: (AppInfo) -> Unit
            ) : RecyclerView.Adapter<AppAdapter.ViewHolder>() {
        
                override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
                    val layout = LinearLayout(parent.context).apply {
                        orientation = LinearLayout.HORIZONTAL
                        setPadding(30, 20, 30, 20)
                        setBackgroundColor(Color.parseColor("#2a2a2a"))
                    }
                    
                    val iconView = ImageView(parent.context).apply {
                        layoutParams = LinearLayout.LayoutParams(60, 60)
                        setPadding(0, 0, 20, 0)
                    }
                    layout.addView(iconView)
                    
                    val nameView = TextView(parent.context).apply {
                        layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                        textSize = 16f
                        setTextColor(Color.WHITE)
                    }
                    layout.addView(nameView)
                    
                    val buttonView = TextView(parent.context).apply {
                        text = "+"
                        textSize = 24f
                        setTextColor(Color.parseColor("#4CAF50"))
                        gravity = android.view.Gravity.CENTER
                        layoutParams = LinearLayout.LayoutParams(80, 80)
                    }
                    layout.addView(buttonView)
                    
                    return ViewHolder(layout, iconView, nameView, buttonView)
                }
        
                override fun onBindViewHolder(holder: ViewHolder, position: Int) {
                    val app = apps[position]
                    holder.nameView.text = app.appName
                    holder.iconView.setImageDrawable(app.icon)
                    holder.buttonView.text = if (app.isCloned) "▶" else "+"
                    holder.buttonView.setTextColor(if (app.isCloned) Color.parseColor("#2196F3") else Color.parseColor("#4CAF50"))
                    holder.itemView.setOnClickListener { onItemClick(app) }
                }
        
                override fun getItemCount() = apps.size
        
                inner class ViewHolder(
                    itemView: android.view.View,
                    val iconView: ImageView,
                    val nameView: TextView,
                    val buttonView: TextView
                ) : RecyclerView.ViewHolder(itemView)
            }
        
            data class AppInfo(
                val packageName: String,
                val appName: String,
                val icon: Drawable,
                var isCloned: Boolean
            )
        }
        EOF
        
        # Add missing imports
        sed -i 's/import android.widget.\*/import android.widget.*\nimport android.view.ViewGroup\nimport android.widget.ImageView\nimport android.content.Intent/' app/src/main/java/com/konasl/nagad/parallel/MainActivity.kt
    
    - name: Create necessary directories
      run: |
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Parallel Space</string>
        </resources>
        EOF
        
        mkdir -p app/src/main/res/drawable
        touch app/src/main/res/drawable/.gitkeep
        
        mkdir -p app/src/main/res/mipmap-hdpi
        touch app/src/main/res/mipmap-hdpi/.gitkeep
    
    - name: Generate gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        android.nonTransitiveRClass=true
        kotlin.code.style=official
        EOF
    
    - name: Generate gradle wrapper properties
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Download gradle-wrapper.jar if not exists
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        fi
    
    - name: Create gradlew script
      run: |
        cat > gradlew << 'EOF'
        #!/bin/sh
        exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
        EOF
        chmod +x gradlew
        
        cat > gradlew.bat << 'EOF'
        @if "%DEBUG%" == "" @echo off
        @rem ##########################################################################
        @rem
        @rem  Gradle startup script for Windows
        @rem
        @rem ##########################################################################
        
        set DIRNAME=%~dp0
        set APP_BASE_NAME=%~n0
        set GRADLE_OPTS=-Xmx2048m
        
        java %GRADLE_OPTS% -cp "%DIRNAME%\gradle\wrapper\gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain %*
        EOF
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: |
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --no-daemon
    
    - name: Verify build and 64-bit support
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK built successfully!"
          echo "📦 APK Size: $(du -h $APK_PATH | cut -f1)"
          
          # Check 64-bit
          if unzip -l $APK_PATH | grep -q "lib/arm64-v8a/"; then
            echo "✅ 64-bit (arm64-v8a) support: YES"
          else
            echo "ℹ️ No native libraries found (pure Kotlin/Java app)"
            echo "✅ 64-bit compatible by default"
          fi
          
          # Get package info
          echo "📱 Package: com.konasl.nagad.parallel"
        else
          echo "❌ Build failed!"
          exit 1
        fi
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ParallelSpace-Debug-64bit
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: Create Build Summary
      run: |
        echo "# 🚀 Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📱 App Details" >> $GITHUB_STEP_SUMMARY
        echo "- **App Name:** Parallel Space" >> $GITHUB_STEP_SUMMARY
        echo "- **Package:** com.konasl.nagad.parallel" >> $GITHUB_STEP_SUMMARY
        echo "- **Gradle Version:** 9.3 (AGP)" >> $GITHUB_STEP_SUMMARY
        echo "- **Architecture:** 64-bit Support" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Time:** $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📦 Download" >> $GITHUB_STEP_SUMMARY
        echo "Click on **Artifacts** above to download the APK" >> $GITHUB_STEP_SUMMARY
